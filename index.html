<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

    <aside class="sidebar">

        <h1>Todo App</h1>

        <ul>
            <li class="filter-btn active" data-filter="all">
                All Tasks
            </li>

            <li class="filter-btn" data-filter="pending">
                Pending
            </li>

            <li class="filter-btn" data-filter="completed">
                Completed
            </li>
        </ul>

        <button id="themeToggle" class="theme-btn">
            Dark Mode
        </button>

        <div class="sidebar-footer">
            Stay organized and productive
        </div>

    </aside>

    <main class="main-content">

        <div class="top-bar">
            <h1>My Tasks</h1>
        </div>

        <p class="subtitle">
            Manage your daily tasks efficiently
        </p>

        <section class="add-task-card">

            <h2>Add New Task</h2>

            <input
                type="text"
                id="taskInput"
                placeholder="Enter task..."
            >

            <div class="task-options">

                <input
                    type="date"
                    id="taskDate"
                >

                <select id="taskCategory">
                    <option>Personal</option>
                    <option>Work</option>
                    <option>Study</option>
                </select>

                <select id="taskPriority">
                    <option>High</option>
                    <option>Medium</option>
                    <option>Low</option>
                </select>

            </div>

            <button id="addBtn">
                Add Task
            </button>

        </section>

        <section class="task-section">

            <div class="search-box">

                <input
                    type="text"
                    id="searchTask"
                    placeholder="Search tasks..."
                >

            </div>

            <div class="task-scroll">

                <div id="taskList"></div>

            </div>

        </section>

        <section class="stats">

            <div class="stat-card">
                <h3>Total</h3>
                <span id="totalTasks">0</span>
            </div>

            <div class="stat-card">
                <h3>Completed</h3>
                <span id="completedTasks">0</span>
            </div>

            <div class="stat-card">
                <h3>Pending</h3>
                <span id="pendingTasks">0</span>
            </div>

        </section>

    </main>

</div>

<script src="script.js"></script>

</body>
</html>

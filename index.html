<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advanced Todo App</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      background:#0f172a;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
      transition:0.3s;
    }

    body.light{
      background:#f1f5f9;
    }

    .container{
      width:100%;
      max-width:550px;
      background:#1e293b;
      padding:25px;
      border-radius:18px;
      color:white;
      box-shadow:0 0 20px rgba(0,0,0,0.3);
      transition:0.3s;
    }

    body.light .container{
      background:white;
      color:black;
    }

    h1{
      text-align:center;
      margin-bottom:20px;
    }

    .top-bar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:20px;
    }

    .theme-btn{
      border:none;
      padding:10px 14px;
      border-radius:8px;
      cursor:pointer;
      background:#38bdf8;
      color:white;
      font-weight:bold;
    }

    .input-group{
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    input, select{
      padding:12px;
      border:none;
      outline:none;
      border-radius:10px;
      font-size:15px;
    }

    .row{
      display:flex;
      gap:10px;
    }

    .add-btn{
      padding:12px;
      border:none;
      border-radius:10px;
      background:#22c55e;
      color:white;
      cursor:pointer;
      font-size:16px;
      font-weight:bold;
    }

    ul{
      list-style:none;
      margin-top:25px;
    }

    li{
      background:#334155;
      padding:15px;
      border-radius:12px;
      margin-bottom:15px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    body.light li{
      background:#e2e8f0;
    }

    .task-info{
      flex:1;
    }

    .task-text{
      font-size:17px;
      margin-bottom:5px;
    }

    .completed .task-text{
      text-decoration:line-through;
      opacity:0.6;
    }

    .task-details{
      font-size:13px;
      opacity:0.8;
    }

    .actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .actions button{
      border:none;
      padding:8px 10px;
      border-radius:8px;
      color:white;
      cursor:pointer;
      font-size:14px;
    }

    .complete-btn{
      background:#0ea5e9;
    }

    .edit-btn{
      background:#f59e0b;
    }

    .delete-btn{
      background:#ef4444;
    }

    .empty{
      text-align:center;
      opacity:0.7;
      margin-top:20px;
    }

    @media(max-width:600px){

      .row{
        flex-direction:column;
      }

      .actions{
        width:100%;
      }

      .actions button{
        flex:1;
      }
    }

  </style>
</head>

<body>

  <div class="container">

    <div class="top-bar">
      <h1>Todo App</h1>

      <button class="theme-btn" onclick="toggleTheme()">
        Theme
      </button>
    </div>

    <div class="input-group">

      <input 
        type="text" 
        id="taskInput"
        placeholder="Enter task"
      >

      <div class="row">

        <input 
          type="date" 
          id="dueDate"
        >

        <select id="category">
          <option value="Personal">Personal</option>
          <option value="Study">Study</option>
          <option value="Work">Work</option>
          <option value="Other">Other</option>
        </select>

      </div>

      <button class="add-btn" onclick="addTask()">
        Add Task
      </button>

    </div>

    <ul id="taskList"></ul>

    <p class="empty" id="emptyMsg">
      No tasks added
    </p>

  </div>

  <script>

    let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

    let theme = localStorage.getItem("theme") || "dark";

    if(theme === "light"){
      document.body.classList.add("light");
    }

    function saveTasks(){
      localStorage.setItem("tasks", JSON.stringify(tasks));
    }

    function displayTasks(){

      const taskList = document.getElementById("taskList");
      const emptyMsg = document.getElementById("emptyMsg");

      taskList.innerHTML = "";

      if(tasks.length === 0){
        emptyMsg.style.display = "block";
      }
      else{
        emptyMsg.style.display = "none";
      }

      tasks.forEach((task,index)=>{

        const li = document.createElement("li");

        if(task.completed){
          li.classList.add("completed");
        }

        li.innerHTML = `

          <div class="task-info">

            <div class="task-text">
              ${task.text}
            </div>

            <div class="task-details">
              Category: ${task.category} |
              Due: ${task.date || "No date"}
            </div>

          </div>

          <div class="actions">

            <button 
              class="complete-btn"
              onclick="toggleTask(${index})"
            >
              ✓
            </button>

            <button 
              class="edit-btn"
              onclick="editTask(${index})"
            >
              Edit
            </button>

            <button 
              class="delete-btn"
              onclick="deleteTask(${index})"
            >
              Delete
            </button>

          </div>

        `;

        taskList.appendChild(li);
      });

    }

    function addTask(){

      const taskInput = document.getElementById("taskInput");
      const dueDate = document.getElementById("dueDate");
      const category = document.getElementById("category");

      const text = taskInput.value.trim();

      if(text === ""){
        alert("Please enter task");
        return;
      }

      tasks.push({
        text:text,
        date:dueDate.value,
        category:category.value,
        completed:false
      });

      saveTasks();
      displayTasks();

      taskInput.value = "";
      dueDate.value = "";

    }

    function toggleTask(index){

      tasks[index].completed = !tasks[index].completed;

      saveTasks();
      displayTasks();
    }

    function deleteTask(index){

      tasks.splice(index,1);

      saveTasks();
      displayTasks();
    }

    function editTask(index){

      const newText = prompt(
        "Edit task",
        tasks[index].text
      );

      if(newText === null || newText.trim() === ""){
        return;
      }

      const newDate = prompt(
        "Edit due date (YYYY-MM-DD)",
        tasks[index].date
      );

      if(newDate === null){
        return;
      }

      const newCategory = prompt(
        "Edit category (Personal/Study/Work/Other)",
        tasks[index].category
      );

      if(newCategory === null || newCategory.trim() === ""){
        return;
      }

      tasks[index].text = newText;
      tasks[index].date = newDate;
      tasks[index].category = newCategory;

      saveTasks();
      displayTasks();
    }

    function toggleTheme(){

      document.body.classList.toggle("light");

      if(document.body.classList.contains("light")){
        localStorage.setItem("theme","light");
      }
      else{
        localStorage.setItem("theme","dark");
      }
    }

    displayTasks();

  </script>

</body>
</html>
